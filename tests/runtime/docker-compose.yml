services:
  db:
    image: mariadb:10.11
    container_name: ogs-seo-db
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpass
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - ogs_seo_db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.8-php8.3-apache
    container_name: ogs-seo-wp
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG: "1"
    ports:
      - "8888:80"
    volumes:
      - ogs_seo_wp_data:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/open-growth-seo

  wpcli:
    image: wordpress:cli-php8.3
    container_name: ogs-seo-wpcli
    depends_on:
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - ogs_seo_wp_data:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/open-growth-seo

volumes:
  ogs_seo_db_data:
  ogs_seo_wp_data: